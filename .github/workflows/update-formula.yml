name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - stable
          - nightly
          - testing
      mull_version:
        description: 'Mull version'
        required: true
      llvm_version:
        description: 'LLVM major version'
        required: true
      package_filename:
        description: 'Package filename'
        required: true

concurrency:
  group: update-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      CHANNEL: ${{ github.event.client_payload.channel || inputs.channel }}
      MULL_VERSION: ${{ github.event.client_payload.mull_version || inputs.mull_version }}
      LLVM_VERSION: ${{ github.event.client_payload.llvm_version || inputs.llvm_version }}
      PACKAGE_FILENAME: ${{ github.event.client_payload.package_filename || inputs.package_filename }}

    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          if [[ "$CHANNEL" == "stable" ]]; then
            FORMULA="Formula/mull@${LLVM_VERSION}.rb"
          else
            FORMULA="Formula/mull-${CHANNEL}@${LLVM_VERSION}.rb"
          fi

          if [[ ! -f "$FORMULA" ]]; then
            echo "Error: Formula not found: $FORMULA"
            exit 1
          fi

          URL="https://dl.cloudsmith.io/public/mull-project/mull-${CHANNEL}/raw/names/mull-${LLVM_VERSION}/versions/${MULL_VERSION}/${PACKAGE_FILENAME}"

          echo "Downloading package to compute SHA256..."
          curl -sLf -o /tmp/package.zip "$URL"
          PACKAGE_SHA256=$(shasum -a 256 /tmp/package.zip | cut -d' ' -f1)

          echo "Updating $FORMULA"
          echo "  Version: $MULL_VERSION"
          echo "  URL: $URL"
          echo "  SHA256: $PACKAGE_SHA256"

          sed -i "s|version \"[^\"]*\"|version \"${MULL_VERSION}\"|" "$FORMULA"
          sed -i "s|url \"[^\"]*\"|url \"${URL}\"|" "$FORMULA"
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${PACKAGE_SHA256}\"|" "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update mull${CHANNEL:+"-$CHANNEL"}@${LLVM_VERSION} to ${MULL_VERSION}"

          for i in {1..5}; do
            git push && exit 0
            echo "Push failed, rebasing and retrying..."
            git pull --rebase
          done
          exit 1
